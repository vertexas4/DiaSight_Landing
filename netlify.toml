# Netlify build & SPA routing config for the Vite + React app.

[build]
  command = "npm run build"
  publish = "dist"

# Single-page app fallback: serve index.html for any path so client-side
# routes (/login, /dashboard, deep links, refreshes) resolve to the app
# instead of a Netlify 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
